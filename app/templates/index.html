<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JusteStreamIt</title>
    <link rel="stylesheet" type="text/css" href="../styles/style.css">
    <script type="module" src="../js/main.js"></script>

</head>

<body>
    <div class="container">
        <header>
            <img src="../imgs/image.png" alt="LOGO">
            <h1>Video a la demande</h1>
        </header>
        <main>
            <section class="column-best-movie-card">
                <h2>Meilleur film</h2>
                <div class="raw-best-movie-card">
                    <div class="raw-column-best-movie-card">
                    </div>
                </div>
                <button class="btn-details">Détails</button>
            </section>

            <section class="column-top-rated-movies-list">
                <h2>Films les mieux noté</h2>
                    <div class="raw-top-rated-movies-list"></div>
            </section>

            <section class="column-category">
                <h2 id="category-title"></h2>
                <div class="column-raw-list-movies-category1"></div>
            </section>

            <section class="column-category">
                <h2 id="category-title-2"></h2>
                <div class="column-raw-list-movies-category2"></div>
            </section>

            <section class="column-category">
                <h2 id="category-title-3"></h2>
                <div class="column-raw-list-movies-category3"></div>
                <select id="category-select">
                </select>
            </section>
        </main>
    </div>
</body>

</html>
